name: rcva_app
description: "RCVA App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1


  # Camera + Image + Location (Timestamp Camera)
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0
  camerawesome: ^2.0.0
  
  

  # Utils
  intl: ^0.19.0
  share_plus: ^10.0.0
  uuid: ^4.5.0
  cleartec_docx_template: ^0.4.1
  http: ^1.2.2
  pdf: ^3.10.8
  printing: ^5.12.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App icon
  flutter_launcher_icons: ^0.13.1

  # Splash screen
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/branding/
    - assets/fonts/
    - assets/templates/ 

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        

# ✅ APP ICON SETTINGS
flutter_icons:
  android: true
  ios: false
  image_path: assets/branding/app_icon.png

# ✅ SPLASH SCREEN SETTINGS
flutter_native_splash:
  android: true
  ios: false
  color: "#FFFFFF"

  image: assets/branding/splash_logo.png

  android_12:
    color: "#FFFFFF"
    branding: assets/branding/splash_logo.png
